<!DOCTYPE html><html lang="es"><head><!-- ===================================================== -->
<!-- METADATOS BASE -->
<!-- ===================================================== -->

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no,
               viewport-fit=cover">

<meta name="theme-color" content="#d4af37">
<meta name="color-scheme" content="dark">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="apple-mobile-web-app-title"
      content="Spa Life">

<meta name="description"
      content="Spa Life: El Viaje del Bienestar">

<title>Spa Life: El Viaje del Bienestar</title>

<!-- ===================================================== -->
<!-- PRELOADS -->
<!-- ===================================================== -->

<link rel="preload"
      href="css/game-ui.css"
      as="style">

<link rel="preload"
      href="css/a11y-talkback.css"
      as="style">

<!-- ===================================================== -->
<!-- ESTILOS -->
<!-- ===================================================== -->

<link rel="stylesheet"
      href="css/game-ui.css">

<link rel="stylesheet"
      href="css/a11y-talkback.css">

</head><body><!-- ===================================================== -->
<!-- APP ROOT -->
<!-- ===================================================== -->

<div id="app-root">

    <!-- ================================================= -->
    <!-- SPLASH / BOOT SCREEN -->
    <!-- ================================================= -->

    <section id="loading-screen"
             role="alert"
             aria-busy="true"
             aria-live="polite"
             aria-label="Pantalla de carga">

        <div class="loading-background"></div>

        <div class="loading-content">

            <div id="logo-placeholder"
                 aria-hidden="true">
                ✨
            </div>

            <h1>Spa Life</h1>

            <p>
                El Viaje del Bienestar
            </p>

            <div class="loading-spinner"></div>

        </div>

    </section>

    <!-- ================================================= -->
    <!-- CONTENEDOR PRINCIPAL -->
    <!-- ================================================= -->

    <main id="game-container"
          role="main"
          aria-label="Área principal del juego">

        <!-- ============================================= -->
        <!-- CANVAS DEL MUNDO -->
        <!-- ============================================= -->

        <div id="game-canvas"
             aria-hidden="true">
        </div>

        <!-- ============================================= -->
        <!-- EFECTOS VISUALES -->
        <!-- ============================================= -->

        <div id="effects-layer"
             aria-hidden="true">
        </div>

        <!-- ============================================= -->
        <!-- PERSONAJES -->
        <!-- ============================================= -->

        <div id="character-layer"
             aria-hidden="true">
        </div>

        <!-- ============================================= -->
        <!-- UI PRINCIPAL -->
        <!-- ============================================= -->

        <nav id="ui-layer"
             aria-label="Interfaz del juego">
        </nav>

        <!-- ============================================= -->
        <!-- MENÚS Y PANELES -->
        <!-- ============================================= -->

        <div id="menu-layer"
             aria-hidden="true">
        </div>

        <!-- ============================================= -->
        <!-- MODALES -->
        <!-- ============================================= -->

        <div id="modal-layer"
             aria-hidden="true">
        </div>

        <!-- ============================================= -->
        <!-- NOTIFICACIONES -->
        <!-- ============================================= -->

        <div id="notification-layer"
             aria-live="polite"
             aria-label="Notificaciones">
        </div>

        <!-- ============================================= -->
        <!-- DIÁLOGOS -->
        <!-- ============================================= -->

        <section id="dialogue-layer"
                 role="region"
                 aria-live="polite"
                 aria-label="Diálogos del juego">
        </section>

        <!-- ============================================= -->
        <!-- ACCESIBILIDAD -->
        <!-- ============================================= -->

        <div id="accessibility-layer"
             role="region"
             aria-live="assertive"
             aria-label="Mensajes de accesibilidad">
        </div>

    </main>

</div>

<!-- ===================================================== -->
<!-- LOG DE CARGA -->

<script>
    console.log('[SpaLife] HTML Loaded');
